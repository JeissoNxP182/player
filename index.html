<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reproductor</title>
  
  <!-- Estilos de Plyr (Diseño tipo YouTube) -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  
  <!-- Soporte para Chromecast (Transmisión a TV) -->
  <script type="text/javascript" src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>

  <!-- Librerías de reproducción HLS y Plyr -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

  <style>
    * { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }
    
    html, body {
      width: 100%;
      height: 100%;
      background-color: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: "YouTube Sans", "Roboto", sans-serif;
    }

    .video-container {
      width: 100%;
      max-width: 100vw;
      max-height: 100vh;
      aspect-ratio: 16/9;
      background: #000;
      position: relative;
    }

    /* Personalización del reproductor estilo YouTube */
    :root {
      --plyr-color-main: #ff0000;
      --plyr-video-background: #000;
      --plyr-menu-background: rgba(28, 28, 28, 0.95);
      --plyr-menu-color: #f1f1f1;
      --plyr-menu-radius: 12px;
      --plyr-control-radius: 4px;
      --plyr-range-track-height: 3px;
    }

    .plyr--full-ui input[type=range] {
      color: #ff0000;
    }

    .plyr__controls {
      background: linear-gradient(rgba(0,0,0,0), rgba(0,0,0,0.85)) !important;
      padding: 10px 15px !important;
    }

    .plyr__poster {
      background-size: cover;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <video id="player" controls playsinline></video>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const videoUrl = urlParams.get('v') || urlParams.get('url');
    const posterUrl = urlParams.get('p') || urlParams.get('poster');
    const videoElement = document.getElementById('player');

    // Lista de controles incluyendo Transmisión (airplay / chromecast)
    const youtubeControls = [
      'play-large',    // Botón rojo de Play al centro
      'play',          // Play / Pausa
      'fast-forward',  // Adelantar
      'mute',          // Silenciar / Volumen
      'volume',        // Barra de volumen
      'current-time',  // Tiempo transcurrido
      'duration',      // Duración total
      'captions',      // Subtítulos
      'settings',      // Menú Tuerca (Calidad / Velocidad)
      'pip',           // Mini-reproductor
      'airplay',       // Transmitir (AirPlay / Chromecast)
      'fullscreen'     // Pantalla Completa
    ];

    let playerInstance = null;

    if (posterUrl) {
      videoElement.setAttribute('poster', posterUrl);
    }

    // Doble clic / doble toque para adelantar/atrasar 10s
    videoElement.addEventListener('dblclick', function (e) {
      if (!playerInstance) return;
      
      const rect = videoElement.getBoundingClientRect();
      const clickX = e.clientX - rect.left;
      const width = rect.width;

      if (clickX < width * 0.35) {
        playerInstance.rewind(10);
      } else if (clickX > width * 0.65) {
        playerInstance.forward(10);
      }
    });

    if (videoUrl) {
      // 1. Transmisión HLS (.m3u8)
      if (videoUrl.includes('.m3u8') && Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(videoUrl);
        hls.attachMedia(videoElement);

        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          const availableQualities = hls.levels.map((l) => l.height);
          availableQualities.unshift(0);

          playerInstance = new Plyr(videoElement, {
            controls: youtubeControls,
            autoplay: false,
            clickToPlay: true,
            tooltips: { controls: true, seek: true },
            quality: {
              default: 0,
              options: availableQualities,
              forced: true,
              onChange: (e) => {
                if (e === 0) hls.currentLevel = -1;
                else hls.levels.forEach((l, i) => { if (l.height === e) hls.currentLevel = i; });
              }
            },
            i18n: { 
              qualityLabel: 'Calidad', 
              speed: 'Velocidad de reproducción', 
              qualityBadge: { 0: 'Automática' } 
            },
            speed: { selected: 1, options: [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2] }
          });
        });
      } 
      // 2. Archivo Directo (MP4 / Streamtape / etc.)
      else {
        videoElement.src = videoUrl;

        playerInstance = new Plyr(videoElement, {
          controls: youtubeControls,
          autoplay: false,
          clickToPlay: true,
          tooltips: { controls: true, seek: true },
          speed: { selected: 1, options: [0.25, 0.5, 0.75, 1, 1.25, 1.5, 1.75, 2] },
          i18n: { speed: 'Velocidad de reproducción' }
        });
      }
    }
  </script>
</body>
</html>
