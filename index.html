<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<!-- Plyr CSS -->
<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>
:root{
    --plyr-color-main:#e50914;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#0b0b0c;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

.player-container{
    width:100%;
    max-width:100vw;
    aspect-ratio:16/9;
    background:#000;
}

video{
    width:100%;
    height:100%;
    display:block;
    background:#000;
}
</style>
</head>
<body>

<div class="player-container">
    <video id="player" playsinline controls></video>
</div>

<!-- Hls.js -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<!-- Plyr -->
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>
const params = new URLSearchParams(location.search);

const videoUrl =
    params.get("v") ||
    params.get("url") ||
    "";

const poster =
    params.get("p") ||
    params.get("poster") ||
    "";

const video = document.getElementById("player");

if (poster) {
    video.poster = poster;
}

let hls;
let player;

function initPlayer(qualityOptions = []){

    player = new Plyr(video,{
        autoplay:false,
        clickToPlay:true,
        resetOnEnd:false,

        controls:[
            "play-large",
            "restart",
            "play",
            "progress",
            "current-time",
            "duration",
            "mute",
            "volume",
            "settings",
            "pip",
            "airplay",
            "fullscreen"
        ],

        settings:["quality","speed"],

        speed:{
            selected:1,
            options:[0.5,0.75,1,1.25,1.5,1.75,2]
        },

        quality: qualityOptions.length ? {
            default: qualityOptions[0],
            options: qualityOptions,
            forced:true,
            onChange:updateQuality
        } : undefined
    });

    // Nunca iniciar automáticamente
    player.pause();

    setupDoubleTap();
}

function updateQuality(newQuality){
    if(!hls) return;

    hls.levels.forEach((level,index)=>{
        if(level.height===newQuality){
            hls.currentLevel=index;
        }
    });
}

function setupDoubleTap(){

    let lastTap=0;

    video.addEventListener("dblclick",seek);

    video.addEventListener("touchend",function(e){

        const now=Date.now();

        if(now-lastTap<300){
            seek(e.changedTouches[0]);
        }

        lastTap=now;

    },{passive:true});

    function seek(ev){

        const rect=video.getBoundingClientRect();

        const x=ev.clientX-rect.left;

        const left=rect.width*0.35;
        const right=rect.width*0.65;

        if(x<=left){
            video.currentTime=Math.max(0,video.currentTime-10);
        }else if(x>=right){
            video.currentTime=Math.min(video.duration||Infinity,video.currentTime+10);
        }
    }
}

if(!videoUrl){

    document.body.innerHTML="";

}else{

    if(videoUrl.toLowerCase().includes(".m3u8")){

        if(Hls.isSupported()){

            hls=new Hls();

            hls.loadSource(videoUrl);

            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED,function(){

                const qualities=hls.levels
                    .map(level=>level.height)
                    .filter((v,i,a)=>a.indexOf(v)===i)
                    .sort((a,b)=>b-a);

                initPlayer(qualities);

            });

        }else if(video.canPlayType("application/vnd.apple.mpegurl")){

            video.src=videoUrl;
            initPlayer();

        }

    }else{

        video.src=videoUrl;
        initPlayer();

    }

}
</script>

</body>
</html>
