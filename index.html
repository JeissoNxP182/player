<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Cine Privado</title>
  <!-- Cargamos la librería HLS.js directamente desde CDN gratuito -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #0d0d0d; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    .container { width: 100%; max-width: 1080px; padding: 10px; }
    video { width: 100%; height: auto; aspect-ratio: 16/9; background: #000; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    .status { margin-top: 15px; font-size: 14px; color: #aaa; text-align: center; }
  </style>
</head>
<body>

  <div class="container">
    <video id="videoPlayer" controls autoplay playsinline></video>
    <div class="status" id="statusText">Cargando película...</div>
  </div>

  <script>
    // Obtener la URL del parámetro ?v= o ?url= en la barra de direcciones
    const urlParams = new URLSearchParams(window.location.search);
    const videoUrl = urlParams.get('v') || urlParams.get('url');
    const videoElement = document.getElementById('videoPlayer');
    const statusText = document.getElementById('statusText');

    if (videoUrl) {
      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(videoUrl);
        hls.attachMedia(videoElement);
        hls.on(Hls.Events.MANIFEST_PARSED, function () {
          statusText.innerText = "Reproduciendo en máxima calidad";
        });
      } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
        // Soporte nativo para Safari/iOS
        videoElement.src = videoUrl;
        statusText.innerText = "Reproduciendo en máxima calidad";
      }
    } else {
      statusText.innerText = "Error: Por favor ingresa un enlace válido al final de la URL.";
    }
  </script>
</body>
</html>
