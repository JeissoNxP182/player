<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        :root {
            --plyr-color-main: #e50914;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0b0c;
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #container {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100vh;
            background-color: #0b0b0c;
            position: relative;
        }

        .plyr {
            width: 100% !important;
            height: 100% !important;
            border-radius: 0;
        }

        .plyr__poster {
            background-color: #0b0b0c;
        }

        video {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }

        /* Asegurar aspect ratio 16:9 */
        .player-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0b0c;
        }

        .player-wrapper::before {
            content: '';
            display: block;
            padding-top: 56.25%; /* 16:9 */
        }

        .plyr-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="player-wrapper">
            <div class="plyr-container">
                <video id="player" playsinline controls crossorigin="anonymous"></video>
            </div>
        </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <script>
        // Obtener parámetros de la URL
        function getUrlParameter(name) {
            name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
            const regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
            const results = regex.exec(location.search);
            return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
        }

        const videoUrl = getUrlParameter('v') || getUrlParameter('url');
        const posterUrl = getUrlParameter('p') || getUrlParameter('poster');

        if (!videoUrl) {
            document.body.innerHTML = `
                <div style="color: white; text-align: center; padding: 50px; font-family: Inter, sans-serif;">
                    <h1 style="color: #e50914;">Error</h1>
                    <p>Debes proporcionar una URL de video usando <strong>?v=URL_DEL_VIDEO</strong> o <strong>?url=URL_DEL_VIDEO</strong></p>
                    <p>Ejemplo: <code>index.html?v=https://example.com/video.mp4</code></p>
                </div>
            `;
        } else {
            const video = document.getElementById('player');
            
            // Configuración base de Plyr
            const playerOptions = {
                autoplay: false,
                muted: false,
                controls: [
                    'play-large',
                    'play',
                    'progress',
                    'current-time',
                    'duration',
                    'mute',
                    'volume',
                    'settings',
                    'pip',
                    'airplay',
                    'fullscreen'
                ],
                settings: ['speed', 'quality'],
                speed: {
                    selected: 1,
                    options: [0.5, 0.75, 1, 1.25, 1.5, 2]
                },
                i18n: {
                    restart: 'Reiniciar',
                    rewind: 'Rebobinar {seektime}s',
                    play: 'Reproducir',
                    pause: 'Pausa',
                    fastForward: 'Avanzar {seektime}s',
                    seek: 'Buscar',
                    played: 'Reproducido',
                    buffered: 'Almacenado',
                    currentTime: 'Tiempo actual',
                    duration: 'Duración',
                    volume: 'Volumen',
                    mute: 'Silenciar',
                    unmute: 'Activar sonido',
                    pip: 'Picture in Picture',
                    airplay: 'AirPlay',
                    fullscreen: 'Pantalla completa',
                    settings: 'Ajustes',
                    speed: 'Velocidad',
                    quality: 'Calidad',
                }
            };

            let player;
            let hls = null;

            function initPlayer() {
                // Determinar si es HLS
                const isHLS = videoUrl.toLowerCase().includes('.m3u8');

                if (isHLS && Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true,
                        backBufferLength: 90
                    });

                    hls.loadSource(videoUrl);
                    hls.attachMedia(video);

                    hls.on(Hls.Events.MANIFEST_PARSED, function () {
                        // Configurar calidades
                        if (hls.levels && hls.levels.length > 0) {
                            const qualities = hls.levels.map(level => level.height).filter(h => h);
                            qualities.unshift(0); // Auto

                            playerOptions.quality = {
                                default: 0,
                                options: qualities,
                                forced: true,
                                onChange: function (newQuality) {
                                    if (newQuality === 0) {
                                        hls.currentLevel = -1; // Auto
                                    } else {
                                        hls.levels.forEach((level, index) => {
                                            if (level.height === newQuality) {
                                                hls.currentLevel = index;
                                            }
                                        });
                                    }
                                }
                            };
                        }
                        
                        // Inicializar Plyr después del manifest
                        player = new Plyr(video, playerOptions);
                    });
                } else {
                    // Video nativo (MP4, etc.)
                    video.src = videoUrl;
                    player = new Plyr(video, playerOptions);
                }

                // Poster
                if (posterUrl) {
                    video.poster = posterUrl;
                }
            }

            // Doble clic / doble toque
            function setupDoubleClick() {
                const container = document.querySelector('.plyr-container');
                
                let lastTap = 0;
                
                function handleDoubleClick(e) {
                    const rect = container.getBoundingClientRect();
                    const x = e.clientX || (e.touches && e.touches[0].clientX);
                    const percent = ((x - rect.left) / rect.width) * 100;
                    
                    if (!player) return;
                    
                    if (percent < 35) {
                        // Izquierda: rewind 10s
                        player.currentTime -= 10;
                    } else if (percent > 65) {
                        // Derecha: forward 10s
                        player.currentTime += 10;
                    } else {
                        // Centro: play/pause
                        if (player.playing) {
                            player.pause();
                        } else {
                            player.play();
                        }
                    }
                }

                // Mouse
                container.addEventListener('dblclick', handleDoubleClick);

                // Touch (doble tap)
                container.addEventListener('touchend', function(e) {
                    const currentTime = new Date().getTime();
                    const tapLength = currentTime - lastTap;
                    if (tapLength < 500 && tapLength > 0) {
                        handleDoubleClick(e);
                    }
                    lastTap = currentTime;
                });
            }

            // Inicializar
            window.addEventListener('load', function() {
                initPlayer();
                setupDoubleClick();
            });

            // Cleanup
            window.addEventListener('beforeunload', function() {
                if (hls) {
                    hls.destroy();
                }
            });
        }
    </script>
</body>
</html>
