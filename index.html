<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Stream Player</title>
  
  <!-- Plyr.js (Estilos y reproductor) -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
  
  <!-- HLS.js (Streaming M3U8) -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Google Cast SDK (Transmitir a la TV) -->
  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>

  <style>
    :root {
      /* Rojo característico de YouTube */
      --plyr-color-main: #ff0000;
      --plyr-video-control-background-hover: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Roboto", "Arial", sans-serif;
    }

    body {
      background-color: #0f0f0f;
      color: #f1f1f1;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* Barra superior estilo YT */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: -0.5px;
    }

    .brand-icon {
      color: #ff0000;
      font-size: 24px;
    }

    /* Botón nativo de Chromecast */
    google-cast-launcher {
      width: 32px;
      height: 32px;
      cursor: pointer;
      --connected-color: #3ea6ff;
      --disconnected-color: #ffffff;
    }

    /* Entrada de URL */
    .input-box {
      display: flex;
      gap: 10px;
      background: #212121;
      padding: 8px 12px;
      border-radius: 20px;
      border: 1px solid #383838;
    }

    .input-box input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 14px;
      padding: 4px 8px;
    }

    .input-box button {
      background: #383838;
      color: #fff;
      border: none;
      padding: 6px 16px;
      border-radius: 14px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-box button:hover {
      background: #515151;
    }

    /* Marco del Reproductor */
    .player-wrapper {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.8);
      position: relative;
    }

    .plyr {
      height: 100%;
      width: 100%;
    }

    /* Indicador de salto rápido (-10s / +10s) */
    .seek-feedback {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 10px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: bold;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
    }

    .seek-feedback.left { left: 10%; }
    .seek-feedback.right { right: 10%; }
    .seek-feedback.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="container">
    <!-- Encabezado con opción de Transmitir -->
    <div class="header">
      <div class="brand">
        <span class="brand-icon">▶</span>
        <span>MyTube</span>
      </div>
      <!-- Botón para enviar a Smart TV / Chromecast -->
      <google-cast-launcher title="Transmitir a la TV"></google-cast-launcher>
    </div>

    <!-- Barra para pegar enlace manual o dinámico -->
    <div class="input-box">
      <input type="url" id="streamUrl" placeholder="Pega una URL de video (.mp4 o .m3u8)..." autocomplete="off">
      <button id="loadBtn">Cargar</button>
    </div>

    <!-- Reproductor de Video -->
    <div class="player-wrapper" id="playerContainer">
      <div class="seek-feedback left" id="feedbackLeft">⏮ -10s</div>
      <div class="seek-feedback right" id="feedbackRight">+10s ⏭</div>

      <video id="player" playsinline controls preload="metadata"></video>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const videoElement = document.getElementById('player');
      const container = document.getElementById('playerContainer');
      const streamInput = document.getElementById('streamUrl');
      const loadBtn = document.getElementById('loadBtn');
      const feedbackLeft = document.getElementById('feedbackLeft');
      const feedbackRight = document.getElementById('feedbackRight');

      let hlsInstance = null;
      let plyrInstance = null;

      // Parámetros por URL: ?v=URL_VIDEO&p=URL_POSTER
      const urlParams = new URLSearchParams(window.location.search);
      const initialVideo = urlParams.get('v') || urlParams.get('url');
      const initialPoster = urlParams.get('p') || urlParams.get('poster');

      if (initialPoster) {
        videoElement.setAttribute('poster', initialPoster);
      }

      // Configuración de controles estilo YouTube
      const controls = [
        'play-large', 'play', 'progress', 'current-time', 'duration',
        'mute', 'volume', 'settings', 'pip', 'airplay', 'fullscreen'
      ];

      function initPlayer(qualities = []) {
        if (plyrInstance) {
          plyrInstance.destroy();
        }

        const config = {
          autoplay: false,
          controls: controls,
          tooltips: { controls: true, seek: true },
          speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] }
        };

        if (qualities.length > 0) {
          config.quality = {
            default: -1,
            options: qualities,
            forced: true,
            onChange: (q) => {
              if (hlsInstance) {
                if (q === -1) hlsInstance.currentLevel = -1;
                else {
                  hlsInstance.levels.forEach((lvl, idx) => {
                    if (lvl.height === q) hlsInstance.currentLevel = idx;
                  });
                }
              }
            }
          };
        }

        plyrInstance = new Plyr(videoElement, config);
      }

      function loadSource(url) {
        if (!url) return;

        if (hlsInstance) {
          hlsInstance.destroy();
        }

        if (url.includes('.m3u8') && Hls.isSupported()) {
          hlsInstance = new Hls();
          hlsInstance.loadSource(url);
          hlsInstance.attachMedia(videoElement);

          hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
            const qualities = hlsInstance.levels.map(l => l.height).filter(Boolean);
            qualities.unshift(-1);
            initPlayer(qualities);
          });
        } else {
          videoElement.src = url;
          initPlayer();
        }
      }

      // Carga inicial (vía parámetro de URL o caja de texto)
      if (initialVideo) {
        streamInput.value = initialVideo;
        loadSource(initialVideo);
      } else {
        initPlayer();
      }

      loadBtn.addEventListener('click', () => loadSource(streamInput.value.trim()));

      // Doble Clic / Doble Toque (-10s izquierda / +10s derecha)
      let lastTap = 0;

      function triggerFeedback(el) {
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 500);
      }

      container.addEventListener('click', (e) => {
        if (e.target.closest('.plyr__controls')) return;

        const now = new Date().getTime();
        const delta = now - lastTap;

        if (delta < 300 && delta > 0) {
          const rect = container.getBoundingClientRect();
          const clickX = e.clientX - rect.left;
          const width = rect.width;
          const percentage = (clickX / width) * 100;

          if (plyrInstance) {
            if (percentage <= 35) {
              plyrInstance.rewind(10);
              triggerFeedback(feedbackLeft);
            } else if (percentage >= 65) {
              plyrInstance.forward(10);
              triggerFeedback(feedbackRight);
            }
          }
        }
        lastTap = now;
      });

      // Inicialización de Google Cast (Chromecast)
      window.__onGCastApiAvailable = function(isAvailable) {
        if (isAvailable) {
          cast.framework.CastContext.getInstance().setOptions({
            receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
            autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
          });
        }
      };
    });
  </script>
</body>
</html>
